<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hora, Fecha y Clima</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap" rel="stylesheet">

<style>

.stage {
  position: relative;
  width: 4147px;
  height: 1556px;
  transform-origin: top left;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Open Sans", sans-serif;
  font-weight: 700;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

#fondoVideo {
  position: absolute;
  top: 0;
  left: 0;
  width: 4147px;
  height: 1556px;
  object-fit: cover;
  z-index: 0;
}

.time {
  position: absolute;
  top: 61%;
  left: 23%;
  transform: translate(-50%, -50%);
  font-size: 157px;
  color: #ffffff;
}

.day-name {
  position: absolute;
  top: 72%;
  left: 22%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  color: #4a90e2;
}

.date {
  position: absolute;
  top: 79%;
  left: 22%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  color: #4a90e2;
  white-space: nowrap;
}

.weather-icon-big {
  position: absolute;
  top: 15%;
  left: 60%;
  transform: translate(-50%, -50%);
  width: 200px;
  height: 500px;
}

.weather {
  position: absolute;
  top: 15%;
  left: 70%;
  transform: translate(-50%, -50%);
  font-size: 200px;
  color: #000000;
}

#greetingTop {
  position: absolute;
  top: 5%;
  left: 93.5%;
  transform: translate(-50%, -50%);
  font-size: 140px;
  color: #4a90e2;
}

#greetingBottom {
  position: absolute;
  top: 56%;
  left: 6%;
  transform: translate(-50%, -50%);
  font-size: 140px;
  color: #4a90e2;
}

.weather-description {
  position: absolute;
  top: 24%;
  left: 68%;
  transform: translate(-50%, -50%);
  font-size: 68px;
  color: #4a90e2;
}

</style>
</head>

<body>

<div class="stage">

<!-- VIDEO -->
<video id="fondoVideo" autoplay muted loop playsinline>
  <source id="videoSource" src="CLIMADIA.mp4" type="video/mp4">
</video>

<div id="clock" class="time"></div>
<div id="dayName" class="day-name"></div>
<div id="date" class="date"></div>

<img id="weatherIconBig" class="weather-icon-big" src="Iconos/Soleado.svg" />

<div id="weather" class="weather"></div>
<div id="weatherText" class="weather-description"></div>

<div id="greetingTop"></div>
<div id="greetingBottom"></div>

</div>

<script>

/* ========================
ESCALADO PANTALLA
======================== */
function escalarStage() {
  const stage = document.querySelector(".stage");

  const scaleX = window.innerWidth / 4147;
  const scaleY = window.innerHeight / 1556;

  const scale = Math.min(scaleX, scaleY);

  stage.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", escalarStage);
window.addEventListener("load", escalarStage);

/* ========================
RELOJ
======================== */
function updateClock() {
  const now = new Date();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("clock").textContent = `${hours}:${minutes}`;

  const days = ["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
  const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  document.getElementById("dayName").textContent = days[now.getDay()];
  document.getElementById("date").textContent = `${now.getDate()} de ${months[now.getMonth()]}`;
}

/* ========================
FONDO VIDEO DIA / NOCHE
======================== */
function updateBackgroundImage() {
  const hour = new Date().getHours();
  const video = document.getElementById("fondoVideo");
  const source = document.getElementById("videoSource");

  let newSrc = "";

  if (hour >= 18 || hour < 6) {
    newSrc = "CLIMANOCHE.mp4";
  } else {
    newSrc = "CLIMADIA.mp4";
  }

  if (!source.src.includes(newSrc)) {
    source.src = newSrc;
    video.load();
    video.play();
  }
}

/* ========================
ICONOS
======================== */
function getWeatherIcon(weatherId, iconCode) {

  const isNight = iconCode.includes("n");

  if (weatherId >= 200 && weatherId < 300) return "Iconos/Tormenta.svg";
  if (weatherId >= 300 && weatherId < 600) return "Iconos/Lluvia.svg";
  if (weatherId === 771) return "Iconos/Vientos fuertes.svg";

  if (weatherId >= 700 && weatherId < 800) {
    return isNight ? "Iconos/Nublado(noche).svg" : "Iconos/Nublado.svg";
  }

  if (weatherId === 800) {
    return isNight ? "Iconos/Despejado(Noche).svg" : "Iconos/Soleado.svg";
  }

  if (weatherId > 800) {
    return isNight ? "Iconos/Nublado(noche).svg" : "Iconos/Nublado.svg";
  }

  return isNight ? "Iconos/Despejado(Noche).svg" : "Iconos/Soleado.svg";
}

/* ========================
CLIMA
======================== */
async function fetchWeather() {

  const apiKey = "65fd2c24a1679d15f7b59502783522f7";
  const city = "Bogotá";

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=es`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    const temperature = Math.round(data.main.temp);
    const description = data.weather[0].description;
    const weatherId = data.weather[0].id;
    const iconCode = data.weather[0].icon;

    const iconPath = getWeatherIcon(weatherId, iconCode);

    document.getElementById("weather").textContent = `${temperature}°C`;
    document.getElementById("weatherText").textContent = description;
    const iconElement = document.getElementById("weatherIconBig");

    if (!iconElement.src.includes(iconPath)) {
      iconElement.src = iconPath;
    }

  } catch (error) {
    document.getElementById("weather").textContent = "--";
    console.error("Error clima:", error);
  }
}

/* ========================
MENSAJE DINÁMICO
======================== */
function updateGreeting() {
  const now = new Date();
  const hour = now.getHours();
  const minutes = now.getMinutes();

  let topText = "";
  let bottomText = "";

  if (hour >= 5 && (hour < 12 || (hour === 12 && minutes === 0))) {
    topText = "Buenos";
    bottomText = "días";
  } else if (hour < 18 || (hour === 18 && minutes === 0)) {
    topText = "Buenas";
    bottomText = "tardes";
  } else if (hour < 23 || (hour === 23 && minutes <= 30)) {
    topText = "Buenas";
    bottomText = "noches";
  }

  document.getElementById("greetingTop").textContent = topText;
  document.getElementById("greetingBottom").textContent = bottomText;
}

/* ========================
INIT
======================== */
updateClock();
setInterval(updateClock, 1000);

updateBackgroundImage();
setInterval(updateBackgroundImage, 300000);

fetchWeather();
setInterval(fetchWeather, 600000);

updateGreeting();
setInterval(updateGreeting, 60000);

</script>

</body>
</html>
